<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kantin — Order Food</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FBF6EE;
    --cream-dark: #F3EBE0;
    --orange: #E8834A;
    --orange-light: #F5C09A;
    --orange-pale: #FDF0E6;
    --green: #4A7C5F;
    --green-light: #A8C5B4;
    --green-pale: #EDF5F0;
    --brown: #6B4C3B;
    --text: #2C1810;
    --text-mid: #6B4C3B;
    --text-muted: #9E7E6E;
    --border: rgba(107,76,59,0.12);
    --white: #FFFFFF;
    --red: #C0392B;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── NAV ─────────────────────────────────────────── */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(251,246,238,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .nav-brand {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600;
    color: var(--text); letter-spacing: -0.5px;
    text-decoration: none;
  }
  .nav-brand span { color: var(--orange); }

  .nav-center {
    flex: 1; max-width: 420px; margin: 0 32px;
  }

  .search-bar {
    width: 100%;
    display: flex; align-items: center; gap: 10px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 10px 18px;
    transition: border-color 0.2s;
  }
  .search-bar:focus-within { border-color: var(--orange); }
  .search-icon { color: var(--text-muted); font-size: 15px; flex-shrink: 0; }
  .search-bar input {
    border: none; outline: none; background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text); width: 100%;
  }
  .search-bar input::placeholder { color: var(--text-muted); }

  .nav-right { display: flex; align-items: center; gap: 12px; }

  .cart-btn {
    display: flex; align-items: center; gap: 7px;
    background: var(--orange-pale);
    border: 1.5px solid var(--orange-light);
    border-radius: 100px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--orange); cursor: pointer;
    transition: all 0.2s; text-decoration: none;
  }
  .cart-btn:hover { background: var(--orange); color: var(--white); border-color: var(--orange); }
  .cart-count {
    background: var(--orange); color: var(--white);
    border-radius: 100px; padding: 1px 7px;
    font-size: 11px; font-weight: 500;
    min-width: 20px; text-align: center;
  }
  .cart-btn:hover .cart-count { background: var(--white); color: var(--orange); }

  .profile-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--brown); color: var(--white);
    border: none; cursor: pointer;
    font-family: 'Fraunces', serif;
    font-size: 15px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; position: relative;
  }
  .profile-btn:hover { background: var(--orange); }

  /* Profile dropdown */
  .profile-dropdown {
    position: absolute; top: calc(100% + 10px); right: 0;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px;
    min-width: 200px;
    box-shadow: 0 8px 32px rgba(44,24,16,0.12);
    display: none;
    z-index: 200;
  }
  .profile-dropdown.open { display: block; }

  .dropdown-header {
    padding: 10px 12px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .dropdown-name {
    font-family: 'Fraunces', serif;
    font-size: 15px; font-weight: 600;
    color: var(--text); letter-spacing: -0.3px;
  }
  .dropdown-email { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .dropdown-npm {
    font-size: 11px; color: var(--orange);
    background: var(--orange-pale);
    border-radius: 6px; padding: 2px 8px;
    display: inline-block; margin-top: 6px;
    font-weight: 500;
  }

  .dropdown-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px;
    font-size: 13px; color: var(--text-mid);
    cursor: pointer; transition: background 0.15s;
    text-decoration: none;
  }
  .dropdown-item:hover { background: var(--cream); }
  .dropdown-item.danger { color: var(--red); }
  .dropdown-item.danger:hover { background: #fdecea; }
  .dropdown-item-icon { font-size: 15px; width: 20px; text-align: center; }

  /* ── HERO ────────────────────────────────────────── */
  .hero {
    background: var(--brown);
    padding: 52px 32px 48px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; }

  .hero-greeting {
    font-size: 13px; font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-bottom: 8px;
  }
  .hero-greeting span { color: var(--orange-light); font-weight: 500; }

  .hero-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 600; letter-spacing: -1.5px; line-height: 1.08;
    color: var(--white); margin-bottom: 32px;
  }
  .hero-headline em { font-style: italic; font-weight: 300; color: var(--orange-light); }

  .hero-stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .hero-stat {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 14px 20px;
  }
  .hero-stat-num {
    font-family: 'Fraunces', serif;
    font-size: 24px; font-weight: 600;
    color: var(--white); letter-spacing: -0.5px;
  }
  .hero-stat-num span { color: var(--orange-light); }
  .hero-stat-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* ── MAIN CONTENT ────────────────────────────────── */
  .main { max-width: 1100px; margin: 0 auto; padding: 40px 32px 80px; }

  /* ── FILTER CHIPS ─────────────────────────────────── */
  .filter-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .filter-chip {
    padding: 8px 16px; border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400;
    color: var(--text-mid); cursor: pointer;
    transition: all 0.2s;
  }
  .filter-chip:hover { border-color: var(--orange-light); background: var(--orange-pale); }
  .filter-chip.active { background: var(--orange); color: var(--white); border-color: var(--orange); font-weight: 500; }

  /* ── SECTION TITLE ───────────────────────────────── */
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 600;
    letter-spacing: -0.5px; color: var(--text);
  }
  .section-count { font-size: 13px; color: var(--text-muted); }

  /* ── STALL GRID ──────────────────────────────────── */
  .stall-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .stall-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none; color: inherit;
  }
  .stall-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(44,24,16,0.1); border-color: var(--orange-light); }

  .stall-card-banner {
    height: 100px;
    background: var(--brown);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .stall-card-banner::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 18px 18px;
  }
  .stall-card-emoji { font-size: 36px; position: relative; }

  .stall-card-status {
    position: absolute; top: 12px; right: 12px;
    padding: 4px 10px; border-radius: 100px;
    font-size: 11px; font-weight: 500;
  }
  .status-open { background: var(--green-pale); color: var(--green); border: 1px solid var(--green-light); }
  .status-closed { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.1); }

  .stall-card-body { padding: 16px 18px 18px; }
  .stall-card-name {
    font-family: 'Fraunces', serif;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.3px; color: var(--text);
    margin-bottom: 4px;
  }
  .stall-card-desc {
    font-size: 13px; color: var(--text-muted);
    line-height: 1.5; margin-bottom: 14px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .stall-card-meta {
    display: flex; align-items: center; justify-content: space-between;
  }
  .stall-card-time {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text-muted);
  }
  .stall-card-time-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-light); }
  .stall-card-order-btn {
    background: var(--orange-pale);
    border: 1px solid var(--orange-light);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px; font-weight: 500;
    color: var(--orange); cursor: pointer;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .stall-card:hover .stall-card-order-btn { background: var(--orange); color: var(--white); border-color: var(--orange); }

  /* ── SKELETON LOADER ─────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--cream-dark) 25%, var(--cream) 50%, var(--cream-dark) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .stall-card-skeleton {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
  }
  .skel-banner { height: 100px; }
  .skel-body { padding: 16px 18px 18px; }
  .skel-line { height: 14px; margin-bottom: 8px; }
  .skel-line.short { width: 60%; }
  .skel-line.medium { width: 80%; }
  .skel-line.full { width: 100%; }

  /* ── EMPTY STATE ──────────────────────────────────── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center; padding: 60px 20px;
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-title {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 600;
    color: var(--text); margin-bottom: 6px;
  }
  .empty-state-sub { font-size: 14px; color: var(--text-muted); }

  /* ── TOAST ───────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--white);
    border-radius: 100px; padding: 12px 24px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .nav { padding: 0 16px; }
    .nav-center { display: none; }
    .hero { padding: 36px 16px 32px; }
    .main { padding: 24px 16px 60px; }
    .stall-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-brand" href="#">Kantin<span>UWKS</span></a>
  <div class="nav-center">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search stalls or food..." oninput="filterStalls()"/>
    </div>
  </div>
  <div class="nav-right">
    <a class="cart-btn" href="#">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </a>
    <div style="position:relative;">
      <button class="profile-btn" id="profileBtn" onclick="toggleDropdown()">
        <span id="profileInitial">?</span>
      </button>
      <div class="profile-dropdown" id="profileDropdown">
        <div class="dropdown-header">
          <div class="dropdown-name" id="dropdownName">Loading...</div>
          <div class="dropdown-email" id="dropdownEmail"></div>
          <div class="dropdown-npm" id="dropdownNpm" style="display:none"></div>
        </div>
        <a class="dropdown-item" href="#">
          <span class="dropdown-item-icon">👤</span> My profile
        </a>
        <a class="dropdown-item" href="#">
          <span class="dropdown-item-icon">📦</span> My orders
        </a>
        <a class="dropdown-item" href="#">
          <span class="dropdown-item-icon">⚙️</span> Settings
        </a>
        <div class="dropdown-item danger" onclick="handleLogout()">
          <span class="dropdown-item-icon">🚪</span> Sign out
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-greeting">Good <span id="timeOfDay">day</span>, <span id="heroName">there</span> 👋</div>
    <div class="hero-headline">What are you<br><em>hungry for?</em></div>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-num" id="statStalls">–<span></span></div>
        <div class="hero-stat-label">Stalls open now</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num">~<span style="color:var(--orange-light)">10</span></div>
        <div class="hero-stat-label">Avg. wait time (min)</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num"><span style="color:var(--orange-light)">18</span></div>
        <div class="hero-stat-label">Total stalls on campus</div>
      </div>
    </div>
  </div>
</section>

<!-- MAIN -->
<main class="main">

  <!-- FILTER CHIPS -->
  <div class="filter-row">
    <button class="filter-chip active" onclick="setFilter('all', this)">All stalls</button>
    <button class="filter-chip" onclick="setFilter('open', this)">Open now</button>
    <button class="filter-chip" onclick="setFilter('food', this)">🍱 Food</button>
    <button class="filter-chip" onclick="setFilter('drinks', this)">🥤 Drinks</button>
    <button class="filter-chip" onclick="setFilter('snacks', this)">🍢 Snacks</button>
  </div>

  <!-- STALL LIST -->
  <div class="section-header">
    <div class="section-title">Campus stalls</div>
    <div class="section-count" id="stallCount"></div>
  </div>

  <div class="stall-grid" id="stallGrid">
    <!-- Skeleton loaders while fetching -->
    <div class="stall-card-skeleton">
      <div class="skel-banner skeleton"></div>
      <div class="skel-body">
        <div class="skel-line medium skeleton"></div>
        <div class="skel-line full skeleton" style="margin-top:6px"></div>
        <div class="skel-line short skeleton" style="margin-top:6px"></div>
      </div>
    </div>
    <div class="stall-card-skeleton">
      <div class="skel-banner skeleton"></div>
      <div class="skel-body">
        <div class="skel-line medium skeleton"></div>
        <div class="skel-line full skeleton" style="margin-top:6px"></div>
        <div class="skel-line short skeleton" style="margin-top:6px"></div>
      </div>
    </div>
    <div class="stall-card-skeleton">
      <div class="skel-banner skeleton"></div>
      <div class="skel-body">
        <div class="skel-line medium skeleton"></div>
        <div class="skel-line full skeleton" style="margin-top:6px"></div>
        <div class="skel-line short skeleton" style="margin-top:6px"></div>
      </div>
    </div>
  </div>

</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── SUPABASE ──────────────────────────────────────────────────────
  const { createClient } = supabase;
  const sb = createClient(
    'https://kalgejckrmlpwwxtitmz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthbGdlamNrcm1scHd3eHRpdG16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjI2NzYsImV4cCI6MjA5MTI5ODY3Nn0.5YQtOtIMciiaMiAyk-b9WM7iIyzHSZEMcs2a1XF5-ho'
  );

  // ── STATE ─────────────────────────────────────────────────────────
  let allStalls = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let currentUser = null;
  let currentProfile = null;

  // ── AUTH GUARD ────────────────────────────────────────────────────
  // Check session on page load — redirect to login if not signed in
  async function init() {
    const { data: { user } } = await sb.auth.getUser();

    if (!user) {
      window.location.href = 'kantin_auth.html';
      return;
    }

    // Also guard against wrong role accessing this page
    const { data: profile } = await sb
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();

    if (!profile || profile.role !== 'student') {
      window.location.href = 'kantin_auth.html';
      return;
    }

    currentUser = user;
    currentProfile = profile;

    // Populate UI with user info
    loadUserUI();

    // Load stalls
    loadStalls();
  }

  // ── USER UI ───────────────────────────────────────────────────────
  function loadUserUI() {
    const name = currentProfile.full_name || 'Student';
    const initial = name.charAt(0).toUpperCase();

    // Nav profile button
    document.getElementById('profileInitial').textContent = initial;

    // Dropdown
    document.getElementById('dropdownName').textContent = name;
    document.getElementById('dropdownEmail').textContent = currentUser.email;

    if (currentProfile.npm) {
      const npmEl = document.getElementById('dropdownNpm');
      npmEl.textContent = 'NPM: ' + currentProfile.npm;
      npmEl.style.display = 'inline-block';
    }

    // Hero greeting
    document.getElementById('heroName').textContent = name.split(' ')[0];

    // Time of day
    const hour = new Date().getHours();
    const tod = hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : 'evening';
    document.getElementById('timeOfDay').textContent = tod;
  }

  // ── LOAD STALLS ───────────────────────────────────────────────────
  async function loadStalls() {
    const { data: stalls, error } = await sb
      .from('stalls')
      .select('*, profiles(full_name)')
      .eq('status', 'approved')
      .order('created_at', { ascending: false });

    if (error) {
      showToast('Failed to load stalls');
      document.getElementById('stallGrid').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">😕</div>
          <div class="empty-state-title">Couldn't load stalls</div>
          <div class="empty-state-sub">Please refresh the page</div>
        </div>`;
      return;
    }

    allStalls = stalls || [];
    renderStalls();
  }

  // ── STALL EMOJIS (based on keywords in name/desc) ─────────────────
  function getStallEmoji(stall) {
    const text = (stall.stall_name + ' ' + (stall.description || '')).toLowerCase();
    if (text.includes('mie') || text.includes('bakso') || text.includes('noodle')) return '🍜';
    if (text.includes('nasi') || text.includes('rice') || text.includes('ayam')) return '🍱';
    if (text.includes('minum') || text.includes('juice') || text.includes('drink') || text.includes('es')) return '🥤';
    if (text.includes('snack') || text.includes('gorengan') || text.includes('kue')) return '🍢';
    if (text.includes('soto') || text.includes('sup') || text.includes('soup')) return '🥣';
    if (text.includes('burger') || text.includes('sandwich')) return '🍔';
    return '🍽️';
  }

  // ── CHECK IF STALL IS OPEN ────────────────────────────────────────
  function isStallOpen(stall) {
    if (!stall.opening_time || !stall.closing_time) return true;
    const now = new Date();
    const cur = now.getHours() * 60 + now.getMinutes();
    const [oh, om] = stall.opening_time.split(':').map(Number);
    const [ch, cm] = stall.closing_time.split(':').map(Number);
    return cur >= oh * 60 + om && cur <= ch * 60 + cm;
  }

  // ── RENDER STALLS ─────────────────────────────────────────────────
  function renderStalls() {
    let filtered = allStalls;

    // Filter
    if (currentFilter === 'open') {
      filtered = filtered.filter(s => isStallOpen(s));
    }

    // Search
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      filtered = filtered.filter(s =>
        s.stall_name.toLowerCase().includes(q) ||
        (s.description || '').toLowerCase().includes(q)
      );
    }

    // Update count
    const openCount = allStalls.filter(s => isStallOpen(s)).length;
    document.getElementById('statStalls').innerHTML = `${openCount}<span style="color:var(--orange-light)"></span>`;
    document.getElementById('stallCount').textContent = `${filtered.length} stall${filtered.length !== 1 ? 's' : ''}`;

    const grid = document.getElementById('stallGrid');

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <div class="empty-state-title">No stalls found</div>
          <div class="empty-state-sub">Try a different search or filter</div>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(stall => {
      const open = isStallOpen(stall);
      const emoji = getStallEmoji(stall);
      const timeLabel = stall.opening_time && stall.closing_time
        ? `${stall.opening_time.slice(0,5)} – ${stall.closing_time.slice(0,5)}`
        : 'Hours vary';

      return `
        <div class="stall-card" onclick="openStall('${stall.id}')">
          <div class="stall-card-banner">
            <div class="stall-card-emoji">${emoji}</div>
            <div class="stall-card-status ${open ? 'status-open' : 'status-closed'}">
              ${open ? '● Open' : '○ Closed'}
            </div>
          </div>
          <div class="stall-card-body">
            <div class="stall-card-name">${stall.stall_name}</div>
            <div class="stall-card-desc">${stall.description || 'Campus canteen stall'}</div>
            <div class="stall-card-meta">
              <div class="stall-card-time">
                <div class="stall-card-time-dot" style="background:${open ? 'var(--green-light)' : 'var(--text-muted)'}"></div>
                ${timeLabel}
              </div>
              <button class="stall-card-order-btn" ${!open ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>
                ${open ? 'Order now' : 'Closed'}
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── FILTER & SEARCH ───────────────────────────────────────────────
  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderStalls();
  }

  function filterStalls() {
    currentSearch = document.getElementById('searchInput').value.trim();
    renderStalls();
  }

  // ── STALL CLICK ───────────────────────────────────────────────────
  function openStall(stallId) {
    // Will navigate to stall menu page (to be built)
    showToast('Stall menu coming soon!');
  }

  // ── PROFILE DROPDOWN ──────────────────────────────────────────────
  function toggleDropdown() {
    document.getElementById('profileDropdown').classList.toggle('open');
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', e => {
    const btn = document.getElementById('profileBtn');
    const dropdown = document.getElementById('profileDropdown');
    if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.classList.remove('open');
    }
  });

  // ── LOGOUT ────────────────────────────────────────────────────────
  async function handleLogout() {
    await sb.auth.signOut();
    window.location.href = 'kantin_auth.html';
  }

  // ── TOAST ─────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── KICK OFF ──────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
